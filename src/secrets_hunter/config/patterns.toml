# Patterns to detect variable assignments that might contain secrets
assignment_patterns = [
    # Assignment operators: a = "secret" or "a" = "secret" or key => "value" or key =: "value" etc.
    '''["']?([a-zA-Z_][a-zA-Z0-9_]*)["']?\s*(?:==|=|:=|=>|=:)\s*["'`]([^"'`]+)["'`]''',

    # Colon key-value pairs: a: "secret" or "a": "secret" (JSON, YAML)
    '''["']?([a-zA-Z_][a-zA-Z0-9_]*)["']?\s*:\s*["']([^"']+)["']''',

    # token = abc123def456xyz789 (unquoted)
    '''["']?([a-zA-Z_][a-zA-Z0-9_]*)["']?\s*[:=]\s*([^\s,}]+)''',

    # Tuple/function assignments: (password, "secret") or ("user", 'pass') or ('key', "value")
    '''\(\s*["']?([^"',\s()]+)["']?\s*,\s*["']([^"']+)["']\s*\)?''',

    # Docker ENV statements: ENV API_KEY "secret123" or ENV PASSWORD secret
    '''ENV\s+([A-Z_][A-Z0-9_]*)\s+["']?([^"'\n]+)["']?''',

    # C/C++ preprocessor defines: #define API_KEY "secret123"
    '''#define\s+([A-Z_][A-Z0-9_]*)\s+["']([^"']+)["']''',

    # Python with type hints: api_key: str | None = "secret123"
    '''([a-zA-Z_][a-zA-Z0-9_]*)\s*:\s*[^=\n]+\s*=\s*["']([^"']+)["']''',
]

# Regex patterns for known secret formats
[[secret_patterns]]
name = "JWT Token"
pattern = '''\beyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\b'''

[[secret_patterns]]
name = "AWS Access Key"
pattern = '''\bAKIA[0-9A-Z]{16}\b'''

[[secret_patterns]]
name = "GitLab Personal Access Token"
pattern = '''\bglpat-[A-Za-z0-9_-]{20}\b'''

[[secret_patterns]]
name = "Stripe API Key"
pattern = '''\bsk_(?:live|test)_[A-Za-z0-9]{24,}\b'''

[[secret_patterns]]
name = "Telegram Bot Token"
pattern = '''\b\d{9,10}:[A-Za-z0-9_-]{35,}\b'''

[[secret_patterns]]
name = "Twilio SID"
pattern = '''\bSK[A-Z0-9]{32}\b'''

